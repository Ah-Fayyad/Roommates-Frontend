[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://roommates-backend.vercel.app"
  VITE_SOCKET_URL = "https://roommates-backend.vercel.app"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
